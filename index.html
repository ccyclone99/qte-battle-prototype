<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QTE Battle Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1280" height="720"></canvas>

    <div id="main-menu" class="overlay">
      <h1>QTE 战斗原型</h1>
      <div class="menu-buttons">
        <button id="btn-start">开始战斗</button>
        <button id="btn-demo">效果演示</button>
      </div>
      <div class="difficulty-row">
        <label for="difficulty-select">难度：</label>
        <select id="difficulty-select">
          <option value="easy">简单</option>
          <option value="normal" selected>普通</option>
          <option value="hard">困难</option>
          <option value="extreme">极难</option>
        </select>
      </div>
      <div class="menu-hint">战斗中按 ESC 可返回此菜单</div>
    </div>

    <div id="ui-layer">
      <div class="panel top-left">
        <div class="bar-row">
          <span class="label">玩家 HP</span>
          <div class="bar"><div id="player-hp-fill" class="fill hp"></div></div>
          <span id="player-hp-text">100/100</span>
        </div>
        <div class="bar-row">
          <span class="label">敌人 HP</span>
          <div class="bar"><div id="enemy-hp-fill" class="fill hp enemy"></div></div>
          <span id="enemy-hp-text">200/200</span>
        </div>
      </div>

      <div class="panel top-right">
        <div id="turn-indicator">玩家回合</div>
        <div id="weapon-info">当前武器：未选择</div>
        <div id="chain-info">—</div>
      </div>

      <div class="help-panel" id="help-panel">
        <div class="help-title">操作说明</div>
        <div>开局：A/S/D 选武器 → 1/2 选咒术 → 1/2/3 选战技</div>
        <div>我方回合：[A/S/D] 触发对应 QTE 链</div>
        <div>敌方回合：[SPACE] 闪避/弹反　[F] 格挡　[A/S/D] 战技反击</div>
      </div>

      <div class="panel bottom-center" id="message-panel">
        <div id="message-text">按 A / S / D 选择武器，开始战斗</div>
      </div>

      <div id="battle-log" class="panel">
        <div class="log-title">战斗日志</div>
        <div id="log-content"></div>
      </div>
    </div>

    <div id="demo-ui-layer" class="demo-ui-layer">
      <div class="demo-panel demo-status-panel">
        <div class="demo-kicker">效果演示</div>
        <div id="demo-phase-title" class="demo-title">选择演示分类</div>
        <div id="demo-style-line" class="demo-line">风格：—</div>
        <div id="demo-mode-line" class="demo-line">模式：—</div>
      </div>

      <div class="demo-panel demo-detail-panel">
        <div class="demo-section-title">当前机制</div>
        <div id="demo-item-title" class="demo-item-title">选择演示项</div>
        <div id="demo-detail-lines" class="demo-lines"></div>
      </div>

      <div class="demo-panel demo-inspector-panel">
        <div class="demo-section-title">播放状态</div>
        <div id="demo-inspector-lines" class="demo-lines"></div>
      </div>

      <div class="demo-panel demo-result-panel">
        <div class="demo-section-title">结算 / 记录</div>
        <div id="demo-result-lines" class="demo-lines"></div>
      </div>

      <div class="demo-panel demo-controls-panel">
        <span id="demo-controls-text">1-4 选择分类 | W 切换风格 | ESC 返回</span>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/difficulty.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/input.js"></script>
  <script src="js/data/weapons.js"></script>
  <script src="js/data/spells.js"></script>
  <script src="js/data/combatArts.js"></script>
  <script src="js/data/styles.js"></script>
  <script src="js/data/defenses.js"></script>
  <script src="js/data/enemies.js"></script>
  <script src="js/demo-mode.js"></script>
  <script src="js/qte-runner.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
